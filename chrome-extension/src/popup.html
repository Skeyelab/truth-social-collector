<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Truth Social Collector</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="panel">
      <h1>Truth Social Collector</h1>
      <div class="field">
        <label>Handle</label>
        <input id="handle" type="text" spellcheck="false" />
      </div>
      <div class="field">
        <label>Interval (minutes)</label>
        <input id="intervalMinutes" type="number" min="1" step="1" />
      </div>
      <div class="field">
        <label>Webhook URL</label>
        <input id="webhookUrl" type="url" spellcheck="false" placeholder="https://..." />
      </div>
      <div class="field inline">
        <label><input id="uploadAllItems" type="checkbox" /> Upload all items</label>
      </div>
      <div class="field inline">
        <label><input id="enabled" type="checkbox" /> Enabled</label>
      </div>
      <div class="buttons">
        <button id="save">Save</button>
        <button id="runNow">Run now</button>
      </div>
      <div id="banner" class="status-banner" hidden></div>
      <pre id="status" class="status"></pre>
      <p class="hint">Keep a Truth Social tab open and logged in.</p>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
